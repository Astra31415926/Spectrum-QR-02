<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spectrum-QR</title>
    
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Стили -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

<div id="app">
    
    <!-- ШАПКА -->
    <header class="nav-bar">
        <div class="nav-btn" id="btn-back" onclick="App.navBack()">
            <span>←</span>
        </div>
        <h1 class="app-title">Spectrum-QR</h1>
        <div class="nav-btn" onclick="App.toggleMenu()">
            <span>☰</span>
        </div>
    </header>

    <!-- КОНТЕЙНЕР ЭКРАНОВ -->
    <main class="screen-container">
        
        <!-- ЭКРАН: ГЛАВНЫЙ -->
        <div id="scr-main" class="screen active">
            <div class="center-box">
                <p class="main-text">Ornamental QR codes — visual patterns that encode data.</p>
                <div class="btn-group">
                    <button class="btn-retro btn-create" onclick="App.navTo('create-opt')">+ Create</button>
                    <button class="btn-retro btn-scan" onclick="App.navTo('scan-choice')">Scan</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН: ВЫБОР СОЗДАНИЯ -->
        <div id="scr-create-opt" class="screen">
            <div class="center-box">
                <button class="btn-retro w-full" onclick="App.navTo('gen-ornament')">Ornament QR</button>
                <button class="btn-retro w-full secondary" onclick="App.navTo('gen-3d')">3D-QR</button>
            </div>
        </div>

        <!-- ЭКРАН: ГЕНЕРАТОР ORNAMENT -->
        <div id="scr-gen-ornament" class="screen gen-layout">
            <div class="qr-zone">
                <div class="qr-frame" onclick="App.saveImage('ornament')">
                    <canvas id="canvas-ornament" width="512" height="512"></canvas>
                </div>
            </div>
            <div class="input-zone">
                <textarea id="input-ornament" class="text-input" placeholder="Enter text..." oninput="OrnamentEngine.handleInput()"></textarea>
                <button id="btn-save-orn" class="btn-retro w-full" onclick="App.saveImage('ornament')" disabled>Save</button>
            </div>
        </div>

        <!-- ЭКРАН: ГЕНЕРАТОР 3D -->
        <div id="scr-gen-3d" class="screen gen-layout">
            <div class="qr-zone">
                <div class="qr-frame" onclick="App.saveImage('3d')">
                    <canvas id="canvas-3d" width="512" height="512"></canvas>
                </div>
            </div>
            <div class="input-zone">
                <textarea id="input-r" class="text-input red" placeholder="RED Channel" oninput="Engine3D.handleInput()"></textarea>
                <textarea id="input-g" class="text-input green" placeholder="GREEN Channel" oninput="Engine3D.handleInput()"></textarea>
                <textarea id="input-b" class="text-input blue" placeholder="BLUE Channel" oninput="Engine3D.handleInput()"></textarea>
                <button id="btn-save-3d" class="btn-retro w-full" onclick="App.saveImage('3d')" disabled>Save</button>
            </div>
        </div>

        <!-- ЭКРАН: ВЫБОР СКАНЕРА (НОВАЯ ЛОГИКА) -->
        <div id="scr-scan-choice" class="screen">
            <div class="center-box">
                <h2 class="screen-title">Select Source</h2>
                <!-- Блок для вывода результата -->
                <div id="scan-results" class="scan-result-box"></div>
                
                <div class="btn-group-vertical">
                    <button class="btn-retro btn-scan" onclick="ScannerEngine.startCamera()">Camera</button>
                    <button class="btn-retro" onclick="document.getElementById('file-input-scan').click()">Gallery</button>
                    <input type="file" id="file-input-scan" accept="image/*" style="display:none" onchange="ScannerEngine.handleFile(event)">
                </div>
            </div>
        </div>

        <!-- ЭКРАНЫ: ИНФО СТРАНИЦЫ -->
        <div id="scr-gallery" class="screen"><div class="center-box">Gallery Coming Soon</div></div>
        <div id="scr-history" class="screen"><div class="center-box">History Info</div></div>
        <div id="scr-tech" class="screen"><div class="center-box">Technology Info</div></div>
        <div id="scr-contacts" class="screen"><div class="center-box">Contacts Info</div></div>

    </main>

    <!-- НИЖНЕЕ МЕНЮ -->
    <footer class="bottom-nav" id="bottom-nav">
        <div class="nav-btn" onclick="App.navTo('gallery')">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span>Gallery</span>
        </div>
        <div class="nav-btn" onclick="App.navTo('history')">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span>History</span>
        </div>
        <div class="nav-btn" onclick="App.navTo('tech')">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span>Tech</span>
        </div>
        <div class="nav-btn" onclick="App.navTo('contacts')">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span>Contacts</span>
        </div>
    </footer>

    <!-- МЕНЮ (СБРОС) -->
    <div id="menu-overlay" class="overlay menu-style hidden">
        <div class="menu-close" onclick="App.toggleMenu()">✕</div>
        <div class="menu-header">Menu</div>
        <div class="menu-section">
            <div class="menu-item" onclick="App.goHome(); App.toggleMenu();">Home</div>
        </div>
    </div>

</div>

<!-- === ВАЖНО: ПОДКЛЮЧАЕМ БИБЛИОТЕКИ ЗДЕСЬ === -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<!-- СКРИПТЫ ЛОГИКИ -->
<script src="js/engine-ornament.js"></script>
<script src="js/engine-3d.js"></script>
<script src="js/main.js"></script>

</body>
</html>
